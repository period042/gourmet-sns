name: Instagram Auto Post

on:
  schedule:
    # 11枠 (10:35〜20:35 JST) X と非重複
    # X crons: 0 23, 30 1, 0 4, 0 8, 0 11 UTC
    - cron: '35 1 * * *'   # 10:35 JST
    - cron: '5 3 * * *'    # 12:05 JST
    - cron: '5 5 * * *'    # 14:05 JST
    - cron: '5 6 * * *'    # 15:05 JST
    - cron: '5 7 * * *'    # 16:05 JST
    - cron: '5 8 * * *'    # 17:05 JST
    - cron: '5 9 * * *'    # 18:05 JST
    - cron: '5 10 * * *'   # 19:05 JST
    - cron: '35 10 * * *'  # 19:35 JST
    - cron: '5 11 * * *'   # 20:05 JST
    - cron: '35 11 * * *'  # 20:35 JST
  workflow_dispatch:

concurrency:
  group: instagram-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Post to Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_BUSINESS_ACCOUNT_ID: ${{ secrets.IG_BUSINESS_ACCOUNT_ID }}
        run: python scripts/post_instagram.py

      - name: Commit posted files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add posted/ || true
          git add queue/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "post: Instagram auto post $(date +%Y%m%d_%H%M%S)"
          for attempt in 1 2 3; do
            echo "Push attempt $attempt"
            if git push; then
              echo "Push succeeded"
              exit 0
            fi
            git pull --rebase origin main
            sleep $((attempt * 5))
          done
          echo "ERROR: Push failed after 3 attempts"
          exit 1
